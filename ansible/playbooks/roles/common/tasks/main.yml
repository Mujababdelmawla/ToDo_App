---
# tasks file for common


- name: update apt cache
  apt:
    update_cache: yes
  become: true
  
- name: install common packages
  become: true
  package:
    name:
      - httpd
      - nodejs
      - npm
    state: present


- name: start and enable httpd service
  become: true
  service:
    name: httpd
    state: started
    enabled: true

- name: copy source code
  become: true 
  synchronize:
    src: "{{ playbook_dir }}/../.."
    dest: "/opt/todo-app"
    recursive: yes
    delete: yes
    rsync_opts:
      - "--exclude=.git"
      - "--exclude=ansible"
      - "--exclude=.github"