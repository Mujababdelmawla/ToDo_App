---
# tasks file for mongodb

- name: Download MongoDB GPG key and convert to binary format
  become: true
  shell: curl -fsSL https://www.mongodb.org/static/pgp/server-6.0.asc | gpg --dearmor > /usr/share/keyrings/mongodb-server-6.0.gpg
  creates: /usr/share/keyrings/mongodb-server-6.0.gpg

- name: Add MongoDB repository with GPG key
  become: true
  ansible.builtin.lineinfile:
    path: /etc/apt/sources.list.d/mongodb-org-6.0.list
    line: "deb [ arch=amd64,arm64 signed-by=/usr/share/keyrings/mongodb-server-6.0.gpg ] https://repo.mongodb.org/apt/ubuntu jammy/mongodb-org/6.0 multiverse"
    create: yes
    state: present

- name: Update apt cache
  become: true
  apt:
    update_cache: yes

- name: Install MongoDB
  become: true
  package:
    name: mongodb-org
    state: present

- name: Start MongoDB service
  become: true
  service:
    name: mongod
    state: started
    enabled: true

- name: Wait for MongoDB to be ready
  wait_for:
    port: 27017
    delay: 5
    timeout: 30

- name: Debug MongoDB status
  debug:
    msg: "MongoDB started successfully on port 27017"