 - name: adding SSH access to a security group
   amazon.aws.ec2_group:
      name: mujab-security
      description: security group for ansible
      region: us-east-1
      rules:
        - proto: tcp
          from_port: 3001
          to_port: 3001
          cidr_ip: 0.0.0.0/0

        - proto: tcp
          from_port: 22
          to_port: 22
          cidr_ip: 0.0.0.0/0

        - proto: tcp
          from_port: 3000
          to_port: 3000
          cidr_ip: 0.0.0.0/0

        - proto: tcp
          from_port: 80
          to_port: 80
          cidr_ip: 0.0.0.0/0
      rules_egress:
        - proto: all
          cidr_ip: 0.0.0.0/0

   register: security_group 

 - name: Launch EC2 instance
   amazon.aws.ec2_instance:
      image_id: "{{ ec2_image_id }}"
      instance_type: "{{ ec2_instance_type }}"
      key_name: "{{ ec2_key_name }}"
      security_group: "{{ security_group_name }}"
      region: "{{ aws_region }}"
      state: running
      wait: true
   register: ec2_instance

 - name: Display EC2 instance info
   debug:
      msg: "Instance created successfully: {{ ec2_instance }}"

 - name: waiting for the instance to be ready 
   wait_for:
      host: "{{ ec2_instance.instances[0].public_dns_name }}"
      port: 22
      delay: 30
      timeout: 300
      state: started
   when: ec2_instance is defined and ec2_instance.instances | length > 0 # this condition ensures that the wait_for task is only executed if the ec2_instance variable is defined and contains at least one instance.

 - name: add the ec2 instance to the inventory dynamically
   add_host:
      name: "{{ ec2_instance.instances[0].public_dns_name }}"
      groups: launched_ec2_instances
      ansible_user: ubuntu
      ansible_ssh_private_key_file: "{{ ec2_ssh_private_key_path}}"

 - name: debug dynamic inventory
   debug:
      var: groups['launched_ec2_instances']

 - name: debug ssh private key path
   debug:
      var: EC2_SSH_PRIVATE_KEY_PATH
